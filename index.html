<html lang="zh-CN">

<style>
:root{--bg:#fafafa;--bg2:#ededf0;--bg3:#ffffff;--sidebar:#f5f5f5;--sidebar-text:#333;--sidebar-sub:#999;--sidebar-hover:#e8e8ed;--sidebar-active:rgba(255,107,53,.08);--sidebar-border:#e5e5e5;--orange:#FF6B35;--cyan:#1890ff;--green:#22c55e;--red:#ef4444;--text:#1a1a2e;--text2:#6b7280;--text3:#9ca3af;--sans:'Noto Sans SC','Inter',sans-serif;--mono:'Inter',monospace}
*{margin:0;padding:0;box-sizing:border-box}html,body{height:100%;overflow:hidden}body{font-family:var(--sans);background:var(--bg);color:var(--text);line-height:1.6}
.app{display:flex;height:100vh;width:100vw}

/* Sidebar - light like Doubao/Coze */
.sidebar{width:260px;min-width:260px;background:var(--sidebar);color:var(--sidebar-text);display:flex;flex-direction:column;transition:all .3s ease;overflow:hidden;border-right:1px solid var(--sidebar-border)}.sidebar.collapsed{width:0;min-width:0;padding:0;border:none}
.sb-head{padding:14px 16px 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.sb-logo{display:flex;align-items:center;gap:10px}
.sb-logo-av{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#FF6B35,#ff9a5c);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:14px;font-weight:700;color:#fff;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
.sb-logo-text{font-family:var(--mono);font-size:17px;font-weight:700;letter-spacing:-1px;color:var(--text)}.sb-logo-text span{color:var(--orange)}
.sb-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;flex-shrink:0}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.new-btn{font-size:12px;padding:6px 14px;background:rgba(255,107,53,.08);border:1px solid rgba(255,107,53,.2);border-radius:8px;color:var(--orange);cursor:pointer;transition:all .15s;font-family:var(--sans);font-weight:500}.new-btn:hover{background:rgba(255,107,53,.15);border-color:rgba(255,107,53,.4)}
.conv-scroll{flex:1;overflow-y:auto;overflow-x:hidden}.conv-scroll::-webkit-scrollbar{width:4px}.conv-scroll::-webkit-scrollbar-thumb{background:rgba(0,0,0,.08);border-radius:2px}.conv-scroll::-webkit-scrollbar-track{background:transparent}
.sb-section{font-size:11px;color:var(--sidebar-sub);letter-spacing:.5px;padding:14px 16px 4px;flex-shrink:0;font-weight:500}
.conv-item{display:flex;align-items:center;gap:10px;padding:8px 14px;cursor:pointer;transition:all .15s;border-radius:8px;margin:1px 6px;border-left:3px solid transparent}.conv-item:hover{background:var(--sidebar-hover)}.conv-item.active{background:var(--sidebar-active);border-left-color:var(--orange)}
.conv-icon{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.conv-info{flex:1;min-width:0}.conv-title{font-size:13px;font-weight:400;color:var(--sidebar-text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.conv-sub{font-size:10px;color:var(--sidebar-sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.conv-badge{font-family:var(--mono);font-size:7px;padding:1px 5px;border-radius:3px;font-weight:500;flex-shrink:0;margin-left:auto}
.bg{background:rgba(34,197,113,.12);color:var(--green)}.bo{background:rgba(255,107,53,.12);color:var(--orange)}.br{background:rgba(239,68,68,.12);color:var(--red)}.bc{background:rgba(14,165,233,.12);color:var(--cyan)}.by{background:rgba(234,179,8,.12);color:#ca8a04}
.ic-o{background:rgba(255,107,53,.08)}.ic-c{background:rgba(14,165,233,.08)}.ic-g{background:rgba(34,197,113,.08)}.ic-y{background:rgba(234,179,8,.08)}.ic-r{background:rgba(239,68,68,.08)}.ic-p{background:rgba(139,92,246,.08)}
.sb-bottom{border-top:1px solid var(--sidebar-border);padding:10px 14px;flex-shrink:0}
.sb-agent-mini{display:flex;align-items:center;gap:6px}.sb-agent-mini .av{width:22px;height:22px;border-radius:6px;background:linear-gradient(135deg,#FF6B35,#ff9a5c);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:9px;font-weight:700;color:#fff}
.sb-agent-mini .name{font-family:var(--mono);font-size:11px;color:var(--sidebar-text)}
.sb-agent-mini .st{font-size:9px;color:var(--green);display:flex;align-items:center;gap:3px;margin-left:auto}.sb-agent-mini .st::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
.sb-chain-row{display:flex;justify-content:space-between;font-family:var(--mono);font-size:8px;color:#999;padding:3px 0 0}.sb-chain-row a{color:rgba(234,179,8,.7);font-size:8px}

/* Chat main */
.chat-main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.chat-bar{height:44px;background:var(--bg3);border-bottom:1px solid var(--sidebar-border);display:flex;align-items:center;justify-content:space-between;padding:0 16px;flex-shrink:0}
.chat-bar-l{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text);font-weight:500}
.toggle-btn{width:32px;height:32px;border-radius:8px;background:transparent;border:none;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .15s}.toggle-btn:hover{background:var(--bg2);color:var(--text)}
.chat-bar-r{display:flex;gap:6px}.bar-btn{font-family:var(--sans);font-size:11px;padding:5px 12px;background:transparent;border:1px solid var(--sidebar-border);color:var(--text2);border-radius:6px;cursor:pointer;transition:all .15s}.bar-btn:hover{border-color:var(--orange);color:var(--orange)}

/* Messages */
.chat-msgs{flex:1;overflow-y:auto;padding:0;scroll-behavior:smooth}.chat-msgs::-webkit-scrollbar{width:4px}.chat-msgs::-webkit-scrollbar-thumb{background:rgba(0,0,0,.08);border-radius:2px}
.msg{padding:16px 0;display:flex;gap:12px;animation:msgIn .3s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.msg-inner{max-width:720px;margin:0 auto;padding:0 24px;display:flex;gap:12px;width:100%}
.msg-av{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
.msg-av.bot{background:linear-gradient(135deg,#FF6B35,#ff9a5c);color:#fff}.msg-av.user{background:var(--cyan);color:#fff}
.msg-body{flex:1;min-width:0}.msg-who{font-size:11px;color:var(--text3);margin-bottom:4px;font-weight:600}
.msg-bubble{font-size:14px;line-height:1.7;word-break:break-word;padding:10px 16px;border-radius:16px;max-width:85%}
.msg.user .msg-bubble{background:var(--cyan);color:#fff;border-bottom-right-radius:4px;margin-left:auto}
.msg.bot .msg-bubble{background:#f0f0f0;color:var(--text);border-bottom-left-radius:4px}
.msg-bubble p{margin-bottom:6px}.msg-bubble p:last-child{margin-bottom:0}.msg-bubble strong{color:var(--orange)}
.msg.user .msg-bubble strong{color:#ffe0c9}

/* Welcome center - Doubao style */
.welcome-center{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px}
.welcome-av{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,#FF6B35,#ff9a5c);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:28px;font-weight:700;color:#fff;margin-bottom:16px;animation:float 3s ease-in-out infinite;box-shadow:0 4px 20px rgba(255,107,53,.2)}
.welcome-title{font-size:24px;font-weight:700;color:var(--text);margin-bottom:6px}
.welcome-sub{color:var(--text2);font-size:15px;margin-bottom:28px;text-align:center}
.example-grid{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;max-width:620px;margin-bottom:32px}
.example-card{padding:12px 18px;background:#f0f0f0;border:none;border-radius:16px;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;gap:2px;min-width:160px;max-width:200px}.example-card:hover{background:rgba(255,107,53,.1);transform:translateY(-1px)}
.ec-title{font-size:13px;color:var(--text);font-weight:500;display:flex;align-items:center;gap:6px}
.ec-desc{font-size:11px;color:var(--text3)}

/* Chips */
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}.chip{font-size:12px;padding:5px 14px;background:var(--bg3);border:1px solid var(--bg2);border-radius:20px;color:var(--text2);cursor:pointer;transition:all .15s}.chip:hover{border-color:var(--orange);color:var(--orange)}

/* Typing */
.typing{display:flex;gap:4px;padding:4px 0}.typing span{width:6px;height:6px;border-radius:50%;background:var(--text3);animation:tb 1.2s infinite}.typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}@keyframes tb{0%,100%{opacity:.3}50%{opacity:1}}

/* Input area */
.input-area{padding:12px 24px 16px;background:var(--bg3);border-top:1px solid var(--sidebar-border)}
.input-row{display:flex;gap:8px;align-items:flex-end;max-width:720px;margin:0 auto}
#chatInput{flex:1;resize:none;border:1px solid var(--sidebar-border);border-radius:12px;padding:10px 16px;font-size:14px;font-family:var(--sans);line-height:1.5;background:var(--bg3);color:var(--text);outline:none;transition:all .2s;max-height:100px}#chatInput:focus{border-color:var(--orange);box-shadow:0 0 0 2px rgba(255,107,53,.1)}#chatInput::placeholder{color:var(--text3)}
.send-btn{width:40px;height:40px;border-radius:10px;background:var(--orange);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:all .15s;flex-shrink:0}.send-btn:hover{background:#e55a28}
.input-hint{text-align:center;font-size:11px;color:var(--text3);margin-top:6px;max-width:720px;margin-left:auto;margin-right:auto}
.func-bar{display:flex;gap:6px;max-width:720px;margin:0 auto 8px;flex-wrap:wrap}
.func-btn{font-size:11px;padding:4px 12px;background:var(--bg);border:1px solid var(--sidebar-border);border-radius:16px;color:var(--text2);cursor:pointer;transition:all .15s;font-family:var(--sans);display:flex;align-items:center;gap:4px}.func-btn:hover{border-color:var(--orange);color:var(--orange)}

/* Panel */
.panel{width:0;overflow:hidden;background:var(--bg3);border-left:1px solid var(--sidebar-border);transition:all .3s cubic-bezier(.4,0,.2,1);flex-shrink:0;display:flex;flex-direction:column}.panel.open{width:380px}
.panel-head{padding:14px 16px;border-bottom:1px solid var(--sidebar-border);display:flex;align-items:center;justify-content:space-between;font-size:14px;font-weight:600;flex-shrink:0}
.panel-close{width:28px;height:28px;border-radius:6px;background:transparent;border:none;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .15s}.panel-close:hover{background:var(--bg2)}
.panel-body{flex:1;overflow-y:auto;padding:16px}.panel-body::-webkit-scrollbar{width:4px}.panel-body::-webkit-scrollbar-thumb{background:rgba(0,0,0,.08);border-radius:2px}

/* Wallet overlay */
.wOv{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:99;display:none;align-items:center;justify-content:center}.wOv.show{display:flex}
.wCard{background:#fff;border-radius:16px;padding:24px;width:320px;max-width:90vw;animation:msgIn .3s ease}
.ov-title{font-size:16px;font-weight:600;margin-bottom:16px;text-align:center}
.wallet-btn{width:100%;padding:12px;border:1px solid var(--bg2);border-radius:10px;background:#fff;cursor:pointer;font-size:14px;margin-bottom:8px;transition:all .15s;display:flex;align-items:center;gap:8px;justify-content:center}.wallet-btn:hover{border-color:var(--orange)}
.wToast{display:none;position:fixed;bottom:20px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:10px;background:#fff;border:1px solid var(--sidebar-border);font-size:13px;z-index:100;animation:msgIn .3s ease}

/* Mobile */
@media(max-width:768px){.sidebar{position:fixed;z-index:50;height:100vh;transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}.panel.open{width:100%;position:fixed;z-index:40;height:100vh}}
</style>
</head>

async function getAIReply(msg,hist){

try{const r=await fetch('https://api.coze.cn/v3/chat',{method:'POST',headers:{'Authorization':'Bearer '+PAT,'Content-Type':'application/json'},body:JSON.stringify({bot_id:BOT_ID,user_id:UID,stream:false,auto_save_history:true,additional_messages:hist.slice(-6)})});const d=await r.json();if(d.code===0&&d.data){const cid=d.data.id,vid=d.data.conversation_id;for(let i=0;i<8;i++){await new Promise(r=>setTimeout(r,1000));const cr=await fetch('https://api.coze.cn/v3/chat/retrieve?chat_id='+cid+'&conversation_id='+vid,{headers:{'Authorization':'Bearer '+PAT}});const cd=await cr.json();if(cd.data&&cd.data.status==='completed'){const mr=await fetch('https://api.coze.cn/v3/chat/message/list?chat_id='+cid+'&conversation_id='+vid,{headers:{'Authorization':'Bearer '+PAT}});const md=await mr.json();if(md.data){const a=md.data.find(m=>m.role==='assistant'&&m.type==='answer');if(a){hist.push({role:'assistant',content:a.content,content_type:'text'});return a.content}}}if(cd.data&&(cd.data.status==='failed'||cd.data.status==='requires_action'))break}}}catch(e){}
