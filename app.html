r;justify-content:center}.mo.a{display:flex}.mo .mx{background:var(--sf);border:1px solid var(--bd);border-radius:16px;padding:24px;width:90%;max-width:480px;max-height:90vh;overflow-y:auto}.mo h2{font-size:18px;margin-bottom:16px}.fd{margin-bottom:16px}.fd label{display:block;font-size:13px;color:var(--mt);margin-bottom:4px}.fd input,.fd select{width:100%;padding:10px 12px;background:var(--bg);border:1px solid var(--bd);border-radius:8px;color:var(--tx);font-size:14px}.fd input:focus{outline:none;border-color:var(--ac)}.sb{display:flex;gap:4px;margin-bottom:20px}.sb>div{flex:1;height:4px;border-radius:2px;background:var(--bd)}.sb>div.dn{background:var(--ac)}.sb>div.ac{background:var(--ac2)}.ji{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:16px;margin-bottom:8px}.ji .tp{display:flex;justify-content:space-between;align-items:center}.st{font-size:12px;padding:3px 10px;border-radius:12px}.s0{background:rgba(251,191,36,.15);color:var(--yl)}.s1{background:rgba(94,106,210,.15);color:var(--ac)}.s2{background:rgba(123,104,238,.15);color:var(--ac2)}.s3{background:rgba(52,211,153,.15);color:var(--gn)}.s5{background:rgba(239,68,68,.15);color:var(--rd)}.to{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:10px;background:var(--sf);border:1px solid var(--bd);font-size:14px;z-index:200;display:none;max-width:360px}.to.sh{display:block}.to.ok{border-color:var(--gn)}.to.er{border-color:var(--rd)}.tb{display:flex;border-bottom:1px solid var(--bd);margin-bottom:16px}.tt{padding:10px 20px;font-size:14px;color:var(--mt);cursor:pointer;border-bottom:2px solid transparent}.tt.ac{color:var(--tx);border-bottom-color:var(--ac)}.em{text-align:center;padding:60px 20px;color:var(--mt)}.em h3{font-size:16px;margin-bottom:8px;color:var(--tx)}.pb{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:4px;font-size:11px;background:rgba(52,211,153,.1);color:var(--gn)}.dt{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px}.dg{background:var(--gn)}.dy{background:var(--yl)}@media(max-width:640px){.hd{padding:12px 16px}.ct{padding:16px}.gr{grid-template-columns:1fr}}</style></head><body>
<div class="hd"><div class="lg">Fly Ω <span>AI经营副驾驶</span></div><div><span id="ns"><span class="dt dy"></span>未连接</span><button class="bt" id="cb" onclick="cw()" style="margin-left:12px">连接钱包</button></div></div>
<div class="ct"><div id="dv"><div class="em"><h3>连接钱包开始使用</h3><p>支持 MetaMask / Trust Wallet</p><button class="bp bt" onclick="cw()" style="margin-top:16px">连接钱包</button></div></div><div id="cv" style="display:none"><div class="tb"><div class="tt ac" onclick="sw('sv',this)">发布任务</div><div class="tt" onclick="sw('jv',this)">我的任务</div></div><div id="sv"><div class="gr" id="sg"></div></div><div id="jv" style="display:none"><div id="jl"></div></div></div></div>

<script>
const MA='0x7ee886b430CB46C0D443dc0f8435230126C746b6',CA='0x07B71cA613AA8ca7a93745766bA8e46f57f570B8',PA='0xcc80C94545c08B60A0B5b616241c115004E93811',TA='0x8B91BDf148a435a480B9207692F21b37D03273D9',GA='0xc5062a8FcC3A49D055D4635fb1D59E19CF7EA1De',UA='0x55d398326f99059fF775485246999027B3197955';
const MABI=[{"inputs":[{"name":"provider","type":"address"},{"name":"amount","type":"uint256"},{"name":"description","type":"string"},{"name":"industry","type":"bytes32"},{"name":"policy","type":"address"}],"name":"placeOrder","outputs":[{"name":"","type":"uint256"}],"stateMutability":"nonpayable","type":"function"},{"inputs":[{"name":"jobId","type":"uint256"}],"name":"getRealClient","outputs":[{"name":"","type":"address"}],"stateMutability":"view","type":"function"},{"inputs":[{"name":"provider","type":"address"}],"name":"getProviderReputation","outputs":[{"name":"totalJobs","type":"uint256"},{"name":"completedJobs","type":"uint256"},{"name":"disputedJobs","type":"uint256"},{"name":"totalValue","type":"uint256"},{"name":"score","type":"uint256"},{"name":"feeBP","type":"uint256"},{"name":"primaryIndustry","type":"bytes32"}],"stateMutability":"view","type":"function"},{"inputs":[{"name":"jobId","type":"uint256"}],"name":"getJobInfo","outputs":[{"name":"client","type":"address"},{"name":"provider","type":"address"},{"name":"budget","type":"uint256"},{"name":"industry","type":"bytes32"},{"name":"settled","type":"bool"},{"name":"refunded","type":"bool"}],"stateMutability":"view","type":"function"}];
const CABI=[{"inputs":[{"name":"jobId","type":"uint256"}],"name":"getJob","outputs":[{"components":[{"name":"id","type":"uint256"},{"name":"client","type":"address"},{"name":"provider","type":"address"},{"name":"evaluator","type":"address"},{"name":"description","type":"string"},{"name":"budget","type":"uint256"},{"name":"expiredAt","type":"uint256"},{"name":"status","type":"uint8"},{"name":"hook","type":"address"},{"name":"submittedAt","type":"uint256"},{"name":"deliverable","type":"bytes32"}],"name":"","type":"tuple"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"jobCounter","outputs":[{"name":"","type":"uint256"}],"stateMutability":"view","type":"function"}];
const UABI=[{"inputs":[{"name":"spender","type":"address"},{"name":"amount","type":"uint256"}],"name":"approve","outputs":[{"name":"","type":"bool"}],"stateMutability":"nonpayable","type":"function"},{"inputs":[{"name":"account","type":"address"}],"name":"balanceOf","outputs":[{"name":"","type":"uint256"}],"stateMutability":"view","type":"function"}];

const GABI=[{"inputs":[{"name":"jobId","type":"uint256"}],"name":"getValidity","outputs":[{"name":"","type":"uint8"}],"stateMutability":"view","type":"function"}];
const IH={'restaurant':'0xc89efdaa54c0f20c7adf612882df0950f5a951637e0307cdcb4c672f298b8bc6','beauty':'0xad7c5bef027816a800da1736444fb58a807ef4c9603b7848673f7e3a68eb14a5','dental':'0xb7d0a0d3f0c8e1b3a4d5e6f7890abcdef1234567890abcdef1234567890abcde','fitness':'0x2d2bd1c1c55271e3e7b1e4b0e6e8c2d3a4b5c6d7e8f90a1b2c3d4e5f6a7b8c9d','pet':'0x3e3ce2d2d66382f4f8c2f5c1f7f9d3e4b5c6d7e8f90a1b2c3d4e5f6a7b8c9d0e1'};
const SV=[{id:'google_business',n:'Google商家优化',d:'更新商家信息、优化地图展示、FAQ结构化',p:199,t:'餐饮/美业/牙科',u:'首月'},{id:'xiaohongshu',n:'小红书矩阵推广',d:'关键词布局、内容发布、before/after展示',p:299,t:'美业/健身/宠物',u:'月'},{id:'geo_local',n:'本地搜索GEO',d:'FAQ结构化+Schema优化+AI引用',p:199,t:'全行业',u:'首月'},{id:'review_reply',n:'评价自动回复',d:'Google/大众点评评价智能回复',p:99,t:'餐饮/美业',u:'月'},{id:'douyin_short',n:'抖音短视频',d:'AI生成短视频脚本+发布',p:399,t:'全行业',u:'月'},{id:'full_package',n:'全案经营托管',d:'Google+小红书+GEO+评价+短视频',p:999,t:'全行业',u:'月'}];

let pv,si,ua,mc,cc,tc,gc,uc,sel;
async function cw(){if(!window.ethereum){ts('请安装MetaMask或Trust Wallet','er');return}try{pv=new ethers.BrowserProvider(window.ethereum);const a=await pv.send('eth_requestAccounts',[]);si=await pv.getSigner();ua=a[0];const n=await pv.getNetwork();if(Number(n.chainId)!==56)try{await pv.send('wallet_switchEthereumChain',[{chainId:'0x38'}])}catch(e){ts('请切换BSC主网','er');return}mc=new ethers.Contract(MA,MABI,si);cc=new ethers.Contract(CA,CABI,si);tc=new ethers.Contract(TA,TABI,si);gc=new ethers.Contract(GA,GABI,si);uc=new ethers.Contract(UA,UABI,si);document.getElementById('dv').style.display='none';document.getElementById('cv').style.display='block';document.getElementById('ns').innerHTML='<span class="dt dg"></span>BSC '+ua.slice(0,6)+'..'+ua.slice(-4);document.getElementById('cb').style.display='none';rS();lJ()}catch(e){ts('连接失败','er')}}

function sS(n){for(let i=1;i<=3;i++)document.getElementById('s'+i).className=i<n?'dn':i===n?'ac':''}
async function cf(){if(!sel||!si)return;const b=document.getElementById('c2');b.disabled=true;b.textContent='处理中...';try{const amt=ethers.parseEther(document.getElementById('pa').value);const ind=document.getElementById('ind').value;sS(1);b.textContent='1/2 授权USDT...';await(await uc.approve(MA,amt)).wait();ts('USDT授权成功');sS(2);b.textContent='2/2 创建任务+托管...';const desc='Fly: '+sel.n+' - '+(document.getElementById('sn').value||'');await(await mc.placeOrder(ua,amt,desc,IH[ind]||IH.restaurant,PA,{gasLimit:3000000})).wait();ts('付款成功！Agent即将执行','ok');cm();lJ()}catch(e){ts('失败: '+(e.reason||e.message.slice(0,80)),'er');b.disabled=false;b.textContent='重试'}}
function cm(){document.getElementById('om').classList.remove('a');sel=null}
async function lJ(){if(!cc||!ua)return;const l=document.getElementById('jl');l.innerHTML='<div style="text-align:center;color:var(--mt);padding:20px">加载中...</div>';try{const c=Number(await cc.jobCounter());let h='',n=0;for(let i=c;i>=1;i--){try{const j=await cc.getJob(BigInt(i));let mine=false;try{mine=(await mc.getRealClient(BigInt(i))).toLowerCase()===ua.toLowerCase()}catch(e){mine=j.client.toLowerCase()===ua.toLowerCase()||j.client.toLowerCase()===MA.toLowerCase()}if(!mine)continue;n++;const st=Number(j.status),bg=ethers.formatEther(j.budget);let v=false;try{v=await tc.isJobVerified(BigInt(i))}catch(e){}let va=0;try{va=Number(await gc.getValidity(BigInt(i)))}catch(e){}h+='<div class="ji"><div class="tp"><div><strong>#'+i+'</strong> '+j.description+'</div><span class="st '+SC[st]+'">'+SN[st]+'</span></div><div style="margin-top:8px;font-size:13px;color:var(--mt);display:flex;gap:16px;flex-wrap:wrap"><span>'+Number(bg).toFixed(2)+' USDT</span>'+(v?'<span class="pb">Oracle已验证</span>':'')+(va===1?'<span class="pb">有效商业任务</span>':'')+'<span>'+new Date(Number(j.expiredAt)*1000).toLocaleDateString()+'</span></div></div>'}catch(e){}}if(!n)h='<div class="em"><h3>暂无任务</h3><p>选择服务发布你的第一个经营任务</p></div>';l.innerHTML=h}catch(e){l.innerHTML='<div class="em"><h3>加载失败</h3></div>'}}
